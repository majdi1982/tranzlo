version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tranzlo-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - tranzlo-net

networks:
  tranzlo-net:
    external: true

volumes:
  redis_data:
    driver: local
