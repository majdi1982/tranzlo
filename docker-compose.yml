version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tranzlo-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APPWRITE_ENDPOINT=https://appwrite.tranzlo.net/v1
      - NEXT_PUBLIC_APPWRITE_PROJECT_ID=6a156f9000335c99e9be
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=AXPRlo7oi-GRgNxmCtjDMJwaKnz1Z2pdrTehZpO4xd_2GPV-m_AeTnacnuZieJatk0pD1R_TOjCMvfT5
    networks:
      - tranzlo-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: tranzlo-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - tranzlo-net

  n8n:
    image: n8nio/n8n:latest
    container_name: tranzlo-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.tranzlo.net
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.tranzlo.net/
      - GENE_API_KEY=${GEMINI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - tranzlo-net

  nginx:
    image: nginx:1.25-alpine
    container_name: tranzlo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - tranzlo-net
    depends_on:
      - frontend
      - n8n

networks:
  tranzlo-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
  n8n_data:
    driver: local
