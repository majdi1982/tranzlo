version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APPWRITE_ENDPOINT=https://appwrite.tranzlo.net/v1
        - NEXT_PUBLIC_APPWRITE_PROJECT_ID=6a156f9000335c99e9be
        - NEXT_PUBLIC_PAYPAL_CLIENT_ID=AXPRlo7oi-GRgNxmCtjDMJwaKnz1Z2pdrTehZpO4xd_2GPV-m_AeTnacnuZieJatk0pD1R_TOjCMvfT5
    container_name: tranzlo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APPWRITE_ENDPOINT=https://appwrite.tranzlo.net/v1
      - NEXT_PUBLIC_APPWRITE_PROJECT_ID=6a156f9000335c99e9be
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=AXPRlo7oi-GRgNxmCtjDMJwaKnz1Z2pdrTehZpO4xd_2GPV-m_AeTnacnuZieJatk0pD1R_TOjCMvfT5
    networks:
      - tranzlo-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: tranzlo-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - tranzlo-net

  listmonk:
    image: listmonk/listmonk:latest
    container_name: tranzlo-listmonk
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./listmonk/config.toml:/listmonk/config.toml
    depends_on:
      listmonk-db:
        condition: service_healthy
    networks:
      - tranzlo-net

  listmonk-db:
    image: postgres:15-alpine
    container_name: tranzlo-listmonk-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=listmonk
      - POSTGRES_USER=listmonk
      - POSTGRES_DB=listmonk
    volumes:
      - listmonk_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tranzlo-net

networks:
  tranzlo-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
  listmonk_db_data:
    driver: local
